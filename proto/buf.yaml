version: v2

modules:
  - path: .
    excludes:
      - vendor/buf

deps:
  - buf.build/protocolbuffers/wellknowntypes
  - buf.build/bufbuild/protovalidate

lint:
  use:
    - STANDARD
  except:
    - PACKAGE_VERSION_SUFFIX
  ignore:
    - vendor/
  ignore_only:
    ENUM_ZERO_VALUE_SUFFIX:

breaking:
  use:
    - FILE
