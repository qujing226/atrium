version: v2

managed:
  enabled: true
  disable:
    - module: buf.build/bufbuild/protovalidate
    - path: vendor
  override:
    - file_option: go_package_prefix
      value: github.com/qujing226/atrium/gen/go

plugins:
  - remote: buf.build/protocolbuffers/go
    out: ../gen/go
    opt: paths=source_relative
  - local: protoc-gen-go-enums
    out: ../gen/go
    opt: paths=source_relative
  - local: protoc-gen-go-string-consts
    out: ../gen/go
    opt: paths=source_relative
